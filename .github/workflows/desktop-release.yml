name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel/path inside the GCS bucket
        required: true
        default: stable
      bucket:
        description: GCS bucket name. Falls back to vars.GCP_UPDATES_BUCKET.
        required: false
        default: ""
      prefix:
        description: GCS object prefix
        required: false
        default: composer/desktop
      update_base_url:
        description: Public update base URL. Falls back to https://storage.googleapis.com/<bucket>/<prefix>/<channel>.
        required: false
        default: ""
  push:
    tags:
      - "v*"
      - "desktop-v*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            target: mac
          - name: Windows
            os: windows-latest
            target: win
          - name: Linux
            os: ubuntu-latest
            target: linux
    env:
      CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
      GCS_PREFIX: ${{ github.event.inputs.prefix || 'composer/desktop' }}
      GCS_BUCKET: ${{ github.event.inputs.bucket || vars.GCP_UPDATES_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm
          sudo snap install snapcraft --classic

      - name: Install dependencies
        run: npm ci

      - name: Compute update URL
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GCS_BUCKET}" ]]; then
            echo "GCP_UPDATES_BUCKET is required. Set it as a repository variable or pass the workflow input." >&2
            exit 1
          fi

          if [[ -n "${{ github.event.inputs.update_base_url }}" ]]; then
            update_base_url="${{ github.event.inputs.update_base_url }}"
          else
            update_base_url="https://storage.googleapis.com/${GCS_BUCKET}/${GCS_PREFIX}/${CHANNEL}"
          fi

          echo "COMPOSER_UPDATE_BASE_URL=${update_base_url%/}" >> "$GITHUB_ENV"
          echo "GCS_DESTINATION=gs://${GCS_BUCKET}/${GCS_PREFIX}/${CHANNEL}" >> "$GITHUB_ENV"

      - name: Typecheck
        run: npm --workspace composer run typecheck

      - name: Build renderer and Electron sources
        run: npm --workspace composer run build

      - name: Prepare Apple notarization key
        if: matrix.target == 'mac'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for required_var in APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER CSC_LINK CSC_KEY_PASSWORD; do
            if [[ -z "${!required_var}" ]]; then
              echo "${required_var} is required for signed and notarized macOS builds." >&2
              exit 1
            fi
          done

          apple_api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          APPLE_API_KEY_PATH="${apple_api_key_path}" node <<'NODE'
          const fs = require("fs");

          fs.writeFileSync(
            process.env.APPLE_API_KEY_PATH,
            Buffer.from(process.env.APPLE_API_KEY_BASE64, "base64"),
          );
          NODE
          chmod 600 "${apple_api_key_path}"
          echo "APPLE_API_KEY=${apple_api_key_path}" >> "${GITHUB_ENV}"

      - name: Package desktop app
        env:
          APPLE_API_KEY_ID: ${{ matrix.target == 'mac' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.target == 'mac' && secrets.APPLE_API_ISSUER || '' }}
          CSC_LINK: ${{ matrix.target == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.target == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.target == 'mac' && 'true' || 'false' }}
        run: npm exec --workspace composer -- electron-builder --${{ matrix.target }} --publish never

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: composer-${{ matrix.target }}-${{ github.sha }}
          path: apps/desktop/release/**
          if-no-files-found: error
          retention-days: 14

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload to GCS update bucket
        shell: bash
        run: |
          set -euo pipefail
          release_file_count=0

          for release_file in apps/desktop/release/*; do
            if [[ -f "$release_file" ]]; then
              release_file_count=$((release_file_count + 1))
              gcloud storage cp \
                --cache-control="public, max-age=60" \
                "$release_file" \
                "$GCS_DESTINATION/"
            fi
          done

          if [[ "$release_file_count" -eq 0 ]]; then
            echo "No top-level release files found to upload." >&2
            exit 1
          fi

name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Update channel/path inside the GCS bucket
        required: true
        default: stable
      target:
        description: Build target to run. Use mac with runner_mode=local to build on the self-hosted Mac runner.
        required: true
        type: choice
        options:
          - mac
          - win
          - linux
          - all
        default: mac
      version_bump:
        description: Version bump to apply before building. Use none for a rebuild of the current version.
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch
      runner_mode:
        description: Runner mode for macOS manual builds.
        required: true
        type: choice
        options:
          - local
          - hosted
        default: local
      bucket:
        description: GCS bucket name. Falls back to vars.GCP_UPDATES_BUCKET.
        required: false
        default: ""
      prefix:
        description: GCS object prefix
        required: false
        default: composer/desktop
      update_base_url:
        description: Public update base URL. Falls back to https://storage.googleapis.com/<bucket>/<prefix>/<channel>.
        required: false
        default: ""
      publish:
        description: Upload release files to the GCS update bucket.
        required: false
        default: "true"
      notarize_macos:
        description: Notarize macOS builds with Apple notarytool.
        required: false
        default: "false"
      sign_windows:
        description: Require and verify Windows code signing.
        required: false
        default: "false"
      upload_artifacts:
        description: Upload release files as GitHub Actions artifacts.
        required: false
        default: "false"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
    tags:
      - "v*"
      - "desktop-v*"

permissions:
  contents: write
  id-token: write

concurrency:
  # Shared with cli-release so the two never push a version bump to the same
  # branch concurrently (which raced and failed when one commit touched both apps).
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare desktop release
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ${{ (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.runner_mode == 'local')) && 'composer-mac-local' || 'ubuntu-latest' }}
    outputs:
      desktop_version: ${{ steps.release.outputs.desktop_version }}
      release_ref: ${{ steps.release.outputs.release_ref }}
      release_tag: ${{ steps.release.outputs.release_tag }}
      should_release: ${{ steps.release.outputs.should_release }}
      build_matrix: ${{ steps.release.outputs.build_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Resolve release version
        id: release
        shell: bash
        env:
          BUILD_TARGET: ${{ github.event_name == 'push' && 'mac' || github.event.inputs.target || 'all' }}
          RUNNER_MODE: ${{ github.event_name == 'push' && 'local' || github.event.inputs.runner_mode || 'hosted' }}
          VERSION_BUMP: ${{ github.event_name == 'push' && 'patch' || github.event.inputs.version_bump || 'none' }}
        run: |
          set -euo pipefail

          should_release="true"
          version_bump="${VERSION_BUMP:-none}"

          case "${version_bump}" in
            patch|minor|major|none) ;;
            *)
              echo "Unsupported version bump: ${version_bump}" >&2
              exit 1
              ;;
          esac

          bump_release_version() {
            if [[ "${version_bump}" == "none" ]]; then
              desktop_version="$(node -p "require('./apps/desktop/package.json').version")"
              release_ref="${GITHUB_SHA}"
              release_tag=""
              return
            fi

            if [[ "${GITHUB_REF_TYPE}" != "branch" ]]; then
              echo "Version bumps can only run from a branch ref; current ref type is ${GITHUB_REF_TYPE}." >&2
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git pull --ff-only origin "${GITHUB_REF_NAME}"

            npm version "${version_bump}" --workspace composer --no-git-tag-version
            npm install --package-lock-only --ignore-scripts

            desktop_version="$(node -p "require('./apps/desktop/package.json').version")"
            release_tag="desktop-v${desktop_version}"

            if git rev-parse "${release_tag}" >/dev/null 2>&1; then
              echo "Release tag ${release_tag} already exists." >&2
              exit 1
            fi

            git add apps/desktop/package.json package-lock.json
            git commit -m "chore(desktop): release v${desktop_version}"
            git tag "${release_tag}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            git push origin "${release_tag}"

            release_ref="${release_tag}"
          }

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            before_sha="${{ github.event.before }}"
            if [[ -z "${before_sha}" || "${before_sha}" =~ ^0+$ ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}")"
            else
              changed_files="$(git diff --name-only "${before_sha}" "${GITHUB_SHA}")"
            fi

            if ! printf '%s\n' "${changed_files}" | grep -qE '^apps/desktop/'; then
              desktop_version="$(node -p "require('./apps/desktop/package.json').version")"
              release_ref="${GITHUB_SHA}"
              release_tag=""
              should_release="false"
            else
              bump_release_version
            fi
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_ref="${GITHUB_REF_NAME}"
            release_tag="${GITHUB_REF_NAME}"
            desktop_version="$(node -p "require('./apps/desktop/package.json').version")"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            bump_release_version
          else
            release_ref="${GITHUB_SHA}"
            release_tag=""
            desktop_version="$(node -p "require('./apps/desktop/package.json').version")"
          fi

          echo "desktop_version=${desktop_version}" >> "$GITHUB_OUTPUT"
          echo "release_ref=${release_ref}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

          node <<'NODE' >> "$GITHUB_OUTPUT"
          const target = process.env.BUILD_TARGET || "all";
          const runnerMode = process.env.RUNNER_MODE || "hosted";

          const targets = target === "all" ? new Set(["mac", "win", "linux"]) : new Set([target]);
          const include = [];

          if (targets.has("mac")) {
            include.push({
              name: "macOS",
              os: runnerMode === "local" ? "composer-mac-local" : "macos-latest",
              target: "mac",
            });
          }

          if (targets.has("win")) {
            include.push({
              name: "Windows",
              os: "windows-latest",
              target: "win",
            });
          }

          if (targets.has("linux")) {
            include.push({
              name: "Linux",
              os: "ubuntu-latest",
              target: "linux",
            });
          }

          console.log(`build_matrix=${JSON.stringify({ include })}`);
          NODE

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    # Sign + notarize normally finishes well under 15 min; cap the job so a
    # wedged package/notarize step (or a dropped self-hosted runner) fails fast
    # instead of lingering toward the 6-hour default.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    env:
      CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
      GCS_PREFIX: ${{ github.event.inputs.prefix || 'composer/desktop' }}
      GCS_BUCKET: ${{ github.event.inputs.bucket || vars.GCP_UPDATES_BUCKET }}
      PUBLISH_RELEASE: "true"
      # Push to main is a real release to users → always sign + notarize (this is
      # what runs the dedicated-keychain setup). Manual dispatch honors its input.
      MACOS_NOTARIZE: ${{ github.event_name == 'push' && 'true' || github.event.inputs.notarize_macos || vars.MACOS_NOTARIZE || 'false' }}
      WINDOWS_SIGNING: ${{ github.event.inputs.sign_windows || vars.WINDOWS_SIGNING || 'false' }}
      UPLOAD_ARTIFACTS: ${{ github.event.inputs.upload_artifacts || vars.DESKTOP_RELEASE_UPLOAD_ARTIFACTS || 'false' }}
      COMPOSER_UPDATE_BASE_URL: https://updates.invalid/composer/desktop/${{ github.event.inputs.channel || 'stable' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.release_ref }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Linux packaging dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm
          sudo snap install snapcraft --classic

      - name: Install dependencies
        run: npm ci

      - name: Compute update URL
        if: env.PUBLISH_RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GCS_BUCKET}" ]]; then
            echo "GCP_UPDATES_BUCKET is required. Set it as a repository variable or pass the workflow input." >&2
            exit 1
          fi

          if [[ -n "${{ github.event.inputs.update_base_url }}" ]]; then
            update_base_url="${{ github.event.inputs.update_base_url }}"
          else
            update_base_url="https://storage.googleapis.com/${GCS_BUCKET}/${GCS_PREFIX}/${CHANNEL}"
          fi

          echo "COMPOSER_UPDATE_BASE_URL=${update_base_url%/}" >> "$GITHUB_ENV"
          echo "GCS_DESTINATION=gs://${GCS_BUCKET}/${GCS_PREFIX}/${CHANNEL}" >> "$GITHUB_ENV"

      - name: Typecheck
        run: npm --workspace composer run typecheck

      - name: Build renderer and Electron sources
        run: npm --workspace composer run build

      - name: Prepare Apple notarization key
        if: matrix.target == 'mac' && env.MACOS_NOTARIZE == 'true'
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for required_var in APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER CSC_LINK CSC_KEY_PASSWORD; do
            if [[ -z "${!required_var}" ]]; then
              echo "${required_var} is required for signed and notarized macOS builds." >&2
              exit 1
            fi
          done

          apple_api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          APPLE_API_KEY_PATH="${apple_api_key_path}" node <<'NODE'
          const fs = require("fs");

          fs.writeFileSync(
            process.env.APPLE_API_KEY_PATH,
            Buffer.from(process.env.APPLE_API_KEY_BASE64, "base64"),
          );
          NODE
          chmod 600 "${apple_api_key_path}"
          echo "APPLE_API_KEY=${apple_api_key_path}" >> "${GITHUB_ENV}"

      - name: Import signing certificate into a dedicated keychain (macOS)
        if: matrix.target == 'mac' && env.MACOS_NOTARIZE == 'true'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          # Build the signing identity in a fresh keychain we own end-to-end,
          # instead of letting electron-builder create its own temporary one.
          # On self-hosted runners its temp-keychain `set-key-partition-list`
          # fails ("SecKeychainUnlock: passphrase not correct") because the
          # generated keychain password and the partition-list password drift.
          # Controlling the password here keeps them identical, and the cleanup
          # step deletes the keychain so nothing accumulates run to run.
          keychain="${RUNNER_TEMP}/composer-signing.keychain-db"
          keychain_password="$(openssl rand -base64 24)"
          cert_path="${RUNNER_TEMP}/composer-signing.p12"

          echo "${CSC_LINK}" | openssl base64 -d -A > "${cert_path}"

          security delete-keychain "${keychain}" 2>/dev/null || true
          security create-keychain -p "${keychain_password}" "${keychain}"
          # Long auto-lock window so the keychain stays usable for the whole job.
          security set-keychain-settings -lut 21600 "${keychain}"
          security unlock-keychain -p "${keychain_password}" "${keychain}"
          security import "${cert_path}" -k "${keychain}" -P "${CSC_KEY_PASSWORD}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s \
            -k "${keychain_password}" "${keychain}" >/dev/null
          # Prepend to the user search list so codesign can reach the private key.
          security list-keychains -d user -s "${keychain}" \
            $(security list-keychains -d user | sed 's/[" ]//g')
          rm -f "${cert_path}"

          echo "CSC_KEYCHAIN=${keychain}" >> "${GITHUB_ENV}"
          echo "Signing identities available in the dedicated keychain:"
          security find-identity -v -p codesigning "${keychain}"

      - name: Validate Windows code signing secrets
        if: matrix.target == 'win' && env.WINDOWS_SIGNING == 'true'
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          for required_var in WIN_CSC_LINK WIN_CSC_KEY_PASSWORD; do
            if [[ -z "${!required_var}" ]]; then
              echo "${required_var} is required for signed Windows builds." >&2
              exit 1
            fi
          done

      - name: Package desktop app
        shell: bash
        env:
          APPLE_API_KEY_ID: ${{ matrix.target == 'mac' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.target == 'mac' && secrets.APPLE_API_ISSUER || '' }}
          # macOS signing uses the dedicated keychain set up above (CSC_KEYCHAIN),
          # so electron-builder discovers the identity from it instead of importing
          # into its own flaky temporary keychain. CSC_LINK / CSC_KEY_PASSWORD are
          # left UNSET (not empty strings): an empty CSC_LINK is treated as a cert
          # path and fails "not a file". Windows uses WIN_CSC_* below.
          CSC_KEYCHAIN: ${{ env.CSC_KEYCHAIN }}
          WIN_CSC_LINK: ${{ matrix.target == 'win' && (github.event.inputs.sign_windows == 'true' || vars.WINDOWS_SIGNING == 'true') && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ matrix.target == 'win' && (github.event.inputs.sign_windows == 'true' || vars.WINDOWS_SIGNING == 'true') && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ ((matrix.target == 'mac' && (github.event.inputs.notarize_macos == 'true' || vars.MACOS_NOTARIZE == 'true')) || (matrix.target == 'win' && (github.event.inputs.sign_windows == 'true' || vars.WINDOWS_SIGNING == 'true'))) && 'true' || 'false' }}
        run: |
          set -euo pipefail

          build_args=(--${{ matrix.target }} --publish never)

          if [[ "${{ matrix.target }}" == "mac" && "${MACOS_NOTARIZE}" != "true" ]]; then
            build_args+=("-c.mac.notarize=false")
          fi

          if [[ "${{ matrix.target }}" == "mac" ]]; then
            # The self-hosted Mac dropped offline mid-package once when the box was
            # starved/idle during the long sign+notarize wait. Hold it awake
            # (display/idle/disk/system, user-active) for the whole electron-builder
            # run so the runner keeps its connection.
            caffeinate -dimsu npm exec --workspace composer -- electron-builder "${build_args[@]}"
          else
            npm exec --workspace composer -- electron-builder "${build_args[@]}"
          fi

      - name: Remove signing keychain (macOS)
        # Always run so the dedicated keychain (and its search-list entry) never
        # lingers on the self-hosted runner — `delete-keychain` also drops it from
        # the search list, restoring the prior state and avoiding the cruft that
        # accumulated from electron-builder's leftover temp keychains.
        if: always() && matrix.target == 'mac' && env.CSC_KEYCHAIN != ''
        shell: bash
        run: |
          security delete-keychain "${CSC_KEYCHAIN}" 2>/dev/null || true
          rm -f "${RUNNER_TEMP}/composer-signing.p12" 2>/dev/null || true

      - name: Verify Windows signature
        if: matrix.target == 'win' && env.WINDOWS_SIGNING == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installer = Get-ChildItem -Path "apps/desktop/release" -Filter "*setup.exe" -File | Select-Object -First 1

          if (-not $installer) {
            throw "No Windows installer was found in apps/desktop/release."
          }

          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName

          if ($signature.Status -ne "Valid") {
            throw "Windows installer signature is $($signature.Status): $($signature.StatusMessage)"
          }

          Write-Host "Windows installer signature is valid: $($signature.SignerCertificate.Subject)"

      - name: Upload workflow artifact
        if: env.UPLOAD_ARTIFACTS == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: composer-${{ matrix.target }}-${{ github.sha }}
          path: apps/desktop/release/**
          if-no-files-found: error
          retention-days: 14

      - name: Authenticate to Google Cloud
        if: env.PUBLISH_RELEASE == 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        if: env.PUBLISH_RELEASE == 'true'
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload to GCS update bucket
        if: env.PUBLISH_RELEASE == 'true'
        shell: bash
        run: |
          set -euo pipefail
          release_file_count=0

          for release_file in apps/desktop/release/*; do
            if [[ -f "$release_file" ]]; then
              release_file_count=$((release_file_count + 1))
              gcloud storage cp \
                --cache-control="public, max-age=60" \
                "$release_file" \
                "$GCS_DESTINATION/"
            fi
          done

          if [[ "$release_file_count" -eq 0 ]]; then
            echo "No top-level release files found to upload." >&2
            exit 1
          fi
